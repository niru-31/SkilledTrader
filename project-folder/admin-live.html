<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Admin Live Sessions | SkilledTrader</title>

  <link rel="stylesheet" href="/css/admin-live.css">
</head>

<body>

<div class="admin-page">

  <header class="admin-header">

    <div>
      <p>Admin Panel</p>
      <h1>Live Session Management</h1>
      <span>Create, start and end SkilledTrader live classes.</span>
    </div>

    <a href="dashboard.html" class="back-btn">
      ← Dashboard
    </a>

  </header>

  <section class="admin-grid">

    <div class="admin-card">

      <h2>Create Live Session</h2>

      <form id="liveSessionForm">

        <label>Session Title</label>
        <input
          type="text"
          id="sessionTitle"
          placeholder="Support & Resistance Live Practice"
          required
        >

        <label>Course</label>
        <select id="courseSelect" required>
          <option value="">Loading courses...</option>
        </select>

        <label>Description</label>
        <textarea
          id="sessionDescription"
          placeholder="Write session description..."
        ></textarea>

        <label>Date</label>
        <input
          type="date"
          id="sessionDate"
          required
        >

        <label>Time</label>
        <input
          type="time"
          id="sessionTime"
          required
        >

        <label>Duration Minutes</label>
        <input
          type="number"
          id="sessionDuration"
          value="60"
          required
        >

        <label>Room Name</label>
        <input
          type="text"
          id="roomName"
          placeholder="SkilledTrader-Foundation-Live"
          required
        >

        <label>Notes URL</label>
        <input
          type="text"
          id="notesUrl"
          placeholder="Google Drive notes link optional"
        >

        <button type="submit">
          Create Session
        </button>

      </form>

    </div>

    <div class="admin-card">

      <h2>Live Sessions</h2>

      <div id="liveSessionsList">

        <p>Loading sessions...</p>

      </div>

    </div>

  </section>

</div>

<script src="/js/admin-live.js"></script>

</body>
</html>
