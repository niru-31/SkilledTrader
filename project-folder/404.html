<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>404 — Page Not Found</title>

  <!-- GOOGLE FONTS -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>

<!-- =========================
     404 SECTION
========================= -->
<section class="error-page">

  <!-- BACKGROUND -->
  <div class="error-bg"></div>

  <div class="error-circle error-circle-1"></div>
  <div class="error-circle error-circle-2"></div>

  <div class="max-w">

    <div class="error-content reveal">

      <!-- ERROR CODE -->
      <div class="error-code">
        404
      </div>

      <!-- TEXT -->
      <h1>
        Looks like this page
        doesn't exist.
      </h1>

      <p>
        The page you're trying to access may have been moved,
        deleted, or never existed in the first place.
      </p>

      <!-- BUTTONS -->
      <div class="error-buttons">

        <a href="index.html" class="btn-primary">
          Back Home
        </a>

        <a href="courses.html" class="btn-secondary">
          Explore Courses
        </a>

      </div>

      <!-- SMALL INFO -->
      <div class="error-info">

        <span>SkilledTrader</span>

        <div class="dot"></div>

        <span>Financial Education Platform</span>

      </div>

    </div>

  </div>

</section>

<!-- =========================
     MAIN JS
========================= -->
<script src="js/main.js"></script>

</body>
</html>
